<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SRG桃源服务器 | 申诉协助</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        @font-face {
            font-family: 'UnifontPixel';
            src: url('font/Unifont13.0.01.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        /* 背景改為與首頁相同的深色十字格紋（會移動） */
        body {
            font-family: 'UnifontPixel', 'Courier New', 'VT323', monospace;
            background-color: #9abed5;          /* 深藍灰基底 */
            overflow-x: hidden;
            min-height: 100vh;
            padding: 24px 32px;
            position: relative;
            background-image: 
                linear-gradient(to right, #d0e8ff 1px, transparent 1px),
                linear-gradient(to bottom, #d0e8ff 1px, transparent 1px);
            background-size: 40px 40px;
            background-position: 0 0;
            animation: moveGrid 40s linear infinite;
        }

        @keyframes moveGrid {
            0% { background-position: 0% 0%; }
            100% { background-position: 80px 80px; }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(248, 250, 255, 0.92);
            backdrop-filter: blur(3px);
            border: 4px solid #5d9ac9;
            box-shadow: 12px 12px 0px 0px rgba(47, 79, 109, 0.3);
            padding: 20px 24px 30px 24px;
            transition: all 0.2s;
        }

        .hero-banner {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            border: 3px solid #3f7eb6;
            margin-bottom: 28px;
            background: #85b9e0;
            box-shadow: 6px 6px 0px #2f5a7a;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: auto;
        }

        .site-title-overlay {
            position: absolute;
            left: 20px;
            bottom: 18px;
            background: rgba(31, 65, 98, 0.85);
            padding: 6px 18px;
            border-right: 4px solid #ffd966;
            border-bottom: 4px solid #ffb347;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'UnifontPixel', monospace;
            text-transform: uppercase;
            color: #f0fcff;
            text-shadow: 3px 3px 0 #1f3f5c;
            backdrop-filter: blur(4px);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 4fr 1fr;
            gap: 28px;
            margin: 20px 0 25px;
        }

        .left-bigbox {
            background: rgba(252, 253, 255, 0.94);
            border: 3px solid #5d9ac9;
            padding: 22px 24px;
            box-shadow: 5px 5px 0px #b8d2ed;
        }

        .back-home-btn {
            display: inline-block;
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
            text-decoration: none;
            margin-bottom: 25px;
        }
        .back-home-btn:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        .team-row {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            margin-bottom: 35px;
        }
        .member-card {
            flex: 1;
            min-width: 220px;
            background: #fefce8;
            border: 2px solid #7ba5c4;
            padding: 18px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 5px 5px 0 #b8d2ed;
            transition: 0.1s linear;
        }
        .member-avatar {
            flex-shrink: 0;
            width: 80px;
            height: 80px;
            object-fit: cover;
            border: 2px solid #ffb347;
            box-shadow: 3px 3px 0 #a0c0dc;
            image-rendering: auto;
        }
        .member-info {
            flex: 1;
        }
        .member-name {
            font-size: 1.4rem;
            font-weight: bold;
            color: #1e4a6e;
            margin-bottom: 8px;
            border-left: 6px solid #ffb347;
            padding-left: 10px;
        }
        .member-contact {
            font-size: 0.9rem;
            color: #2f6c8f;
            line-height: 1.5;
        }
        .member-contact span {
            display: block;
            margin: 5px 0;
        }

        .intro-section {
            margin-top: 20px;
            border-top: 2px dotted #9cbedc;
            padding-top: 20px;
        }
        .intro-section h3 {
            font-size: 1.6rem;
            border-left: 12px solid #ffb347;
            padding-left: 15px;
            margin-bottom: 18px;
            color: #1e4a6e;
            font-family: 'UnifontPixel', monospace;
        }
        .intro-section p {
            margin-bottom: 16px;
            line-height: 1.6;
            color: #1e3b4f;
            font-size: 1rem;
        }

        .team-img-container {
            margin: 24px 0 10px 0;
            text-align: center;
            cursor: pointer;
            overflow: hidden;
        }
        .team-img {
            width: 100%;
            height: auto;
            display: block;
            border: 2px solid #5d9ac9;
            box-shadow: 4px 4px 0px #89b3d6;
            transition: transform 0.2s ease;
            image-rendering: auto;
        }
        .team-img:hover {
            transform: scale(1.02);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 4px solid #ffd966;
            box-shadow: 0 0 30px #ffb347;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #ffd966;
            font-size: 48px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 0 12px;
            border-radius: 8px;
        }
        .close-modal:hover {
            color: #ffb347;
            transform: scale(1.1);
        }

        .right-smallbox {
            background: rgba(248, 252, 255, 0.96);
            border: 3px solid #5d9ac9;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            box-shadow: 5px 5px 0px #a1c2e0;
            align-self: start;
            position: sticky;
            top: 30px;
        }
        .link-card {
            border-bottom: 2px dotted #8fb4d4;
            padding-bottom: 14px;
        }
        .link-card h3 {
            font-size: 1.4rem;
            background: #cde5ff;
            display: inline-block;
            padding: 4px 12px;
            margin-bottom: 14px;
            border-top: 2px solid #ffbc6e;
            color: #1e557a;
            font-family: 'UnifontPixel', monospace;
        }
        .link-card ul {
            list-style: none;
            padding-left: 8px;
        }
        .link-card li {
            margin: 12px 0;
        }
        .link-card li a {
            color: #2d6a8f;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dotted #8bb3ce;
            transition: all 0.1s;
            display: inline-block;
        }
        .link-card li a:hover {
            color: #cc7b2c;
            border-bottom-color: #cc7b2c;
            transform: translateX(4px);
            text-shadow: 1px 1px 0 #eef4ff;
        }

        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
        }
        .lang-btn.active {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            box-shadow: inset 1px 1px 0px #ad6d2a;
        }
        .lang-btn:hover {
            background: #fee3b5;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            border-top: 2px solid #9cbedc;
            padding-top: 18px;
            color: #2f6c8f;
            letter-spacing: 1px;
        }
        .blink-pixel {
            animation: blink 1.2s step-end infinite;
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 860px) {
            body {
                padding: 16px;
            }
            .content-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .team-row {
                flex-direction: column;
            }
            .hero-banner {
                height: 130px;
            }
            .site-title-overlay {
                font-size: 1.2rem;
                bottom: 8px;
                left: 12px;
            }
            .right-smallbox {
                position: static;
            }
            .member-card {
                flex-direction: column;
                text-align: center;
            }
            .member-info {
                text-align: center;
            }
            .member-name {
                border-left: none;
                border-top: 3px solid #ffb347;
                padding-left: 0;
                padding-top: 5px;
            }
            .modal-content {
                max-width: 95%;
            }
        }

        ::-webkit-scrollbar {
            width: 12px;
            background: #caddf0;
        }
        ::-webkit-scrollbar-thumb {
            background: #5f93bb;
            border: 1px solid #bfd6f0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button class="lang-btn" data-lang="zh">简体中文</button>
        <button class="lang-btn" data-lang="zh-TW">繁體中文</button>
        <button class="lang-btn" data-lang="en">ENGLISH</button>
    </div>

    <div class="hero-banner">
        <img src="image/baa.jpg" alt="背景图" onerror="this.src='https://placehold.co/1200x300/6aa9d9/white?text=🖼️+Replace+Me+in+root'">
        <div class="site-title-overlay" id="siteNameOverlay">✦ SRG 管理团队 ✦</div>
    </div>

    <div class="content-grid">
        <div class="left-bigbox" id="leftContent">
        </div>

        <div class="right-smallbox" id="rightLinks">
        </div>
    </div>

    <footer>
        <span class="blink-pixel">◉</span> SRG 桃源服务器 · 申诉协助 <span class="blink-pixel">◉</span><br>
        桃源岛委员会 | 请务必详细描述您的状况！
    </footer>
</div>

<div id="imageModal" class="modal">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modalImg">
</div>

<script>
    // ---------- 多語言資源（已交換服主與市長的顯示順序：服主在左，市長在右）----------
    const LANGUAGE_DATA = {
        "zh": {
            siteName: "申诉协助",
            backBtn: "← 返回首页",
            members: [
                // 順序調整：先服主，後市長
                {
                    avatar: "image/deityman.png",
                    name: "服主 · DeityMan_",
                    contact: "💬 QQ: 2316111922\n重要事务、服务器主要维护\n负责管理权力合规性审查及人事变更\n· 严重情况-联系对象",
                    positionDesc: "服务器创始人 / 主运维"
                },
                {
                    avatar: "image/LK_1.png",
                    name: "市长 · LVMEN__KWAN",
                    contact: "💬 QQ: 3678208304\n一般治理、仲裁事务\n负责审查权力合规性\n· 普通情况-优先联系对象",
                    positionDesc: "服务器管理 / 代管"
                }
            ],
            introTitle: "📖 关于管理团队",
            introParagraphs: [
                "SRG桃源服务器由一群热爱Minecraft的伙伴共同维护。我们坚持公正、透明、友善的原则，为所有玩家提供纯净公益的生存环境。",
                "服主Deityman负责服务器整体架构与决策，拥有多年服务器运维经验；市长LVMEN__KWAN专注于纠纷调解与规则执行。所有管理者均接受玩家监督，任何问题可通过上述联系方式反馈。",
                "管理团队承诺：不滥用权限，不偏袒任何玩家。我们会定期公开处理记录，确保每一个裁决都有据可依。若玩家在服务器处罚中想提出声明异议，请联系任意上述处理人。"
            ],
            teamImage: "image/smad/2025-2026op_sc.jpg",
            rightLinks: {
                sections: [
                    {
                        title: "📜 相关页面",
                        links: [
                            { name: "规则制度", url: "rules_scl.html" },
                            { name: "组织架构", url: "smad.html" }
                        ]
                    }
                ]
            }
        },
        "zh-TW": {
            siteName: "申訴協助",
            backBtn: "← 返回首頁",
            members: [
                {
                    avatar: "image/deityman.png",
                    name: "服主 · DeityMan_",
                    contact: "💬 QQ: 2316111922\n重要事務、伺服器主要維護\n負責管理權力合規性審查及人事變更\n· 嚴重情況-聯繫對象",
                    positionDesc: "伺服器創始人 / 主運維"
                },
                {
                    avatar: "image/LK_1.png",
                    name: "市長 · LVMEN__KWAN",
                    contact: "💬 QQ: 3678208304\n一般治理、仲裁事務\n負責審查權力合規性\n· 普通情況-優先聯繫對象",
                    positionDesc: "伺服器管理 / 代管"
                }
            ],
            introTitle: "📖 關於管理團隊",
            introParagraphs: [
                "SRG桃源伺服器由一群熱愛Minecraft的夥伴共同維護。我們堅持公正、透明、友善的原則，為所有玩家提供純淨公益的生存環境。",
                "服主Deityman負責伺服器整體架構與決策，擁有多年伺服器運維經驗；市長LVMEN__KWAN專注於糾紛調解與規則執行。所有管理者均接受玩家監督，任何問題可透過上述聯繫方式回饋。",
                "管理團隊承諾：不濫用權限，不偏袒任何玩家。我們會定期公開處理記錄，確保每一個裁決都有據可依。若玩家在伺服器處罰中想提出聲明異議，請聯繫任意上述處理人。"
            ],
            teamImage: "image/smad/2025-2026op_tc.jpg",
            rightLinks: {
                sections: [
                    {
                        title: "📜 相關頁面",
                        links: [
                            { name: "規則制度", url: "rules_scl.html" },
                            { name: "組織架構", url: "smad.html" }
                        ]
                    }
                ]
            }
        },
        "en": {
            siteName: "Appeal Assistance",
            backBtn: "← Home",
            members: [
                {
                    avatar: "image/deityman.png",
                    name: "Owner · DeityMan_",
                    contact: "💬 QQ: 2316111922\nMajor affairs, server maintenance\nReviews admin power compliance & personnel changes\n· Severe cases - contact",
                    positionDesc: "Founder / Lead Ops"
                },
                {
                    avatar: "image/LK_1.png",
                    name: "Mayor · LVMEN__KWAN",
                    contact: "💬 QQ: 3678208304\nGeneral governance, arbitration\nReviews power compliance\n· Normal cases - priority contact",
                    positionDesc: "Server Management / Acting"
                }
            ],
            introTitle: "📖 About the Management Team",
            introParagraphs: [
                "SRG Taoyuan server is maintained by a group of Minecraft enthusiasts. We uphold fairness, transparency and friendliness, providing a pure and public welfare survival environment.",
                "Owner Deityman is responsible for overall architecture and decision-making, with years of server operation experience; Mayor LVMEN__KWAN focuses on dispute mediation and rule enforcement. All managers accept player supervision — any issues can be reported via the contacts above.",
                "We promise: no abuse of power, no favoritism. Handling records will be published regularly to ensure every ruling is justified. If you wish to appeal a server punishment, please contact any of the above personnel."
            ],
            teamImage: "image/smad/2025-2026op_eng.jpg",
            rightLinks: {
                sections: [
                    {
                        title: "📜 Pages",
                        links: [
                            { name: "Server Rules", url: "rules_scl.html" },
                            { name: "Organization", url: "smad.html" }
                        ]
                    }
                ]
            }
        }
    };

    // DOM 元素
    const siteNameElem = document.getElementById('siteNameOverlay');
    const leftContainer = document.getElementById('leftContent');
    const rightContainer = document.getElementById('rightLinks');
    const langBtns = document.querySelectorAll('.lang-btn');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');

    // 渲染左側內容
    function renderLeft(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;

        let html = `<a href="index.html" class="back-home-btn">${data.backBtn}</a>`;
        
        html += `<div class="team-row">`;
        data.members.forEach(member => {
            const contactHtml = member.contact.replace(/\n/g, '<br>');
            html += `
                <div class="member-card">
                    <img src="${member.avatar}" alt="${member.name}" class="member-avatar" onerror="this.src='https://placehold.co/80x80/aad0f0/white?text=Avatar'">
                    <div class="member-info">
                        <div class="member-name">${member.name}</div>
                        <div class="member-contact">${contactHtml}</div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;

        html += `<div class="intro-section">
                    <h3>${data.introTitle}</h3>`;
        data.introParagraphs.forEach(p => {
            html += `<p>${p}</p>`;
        });
        
        html += `<div class="team-img-container" id="teamImgContainer">
                    <img src="${data.teamImage}" alt="Team Photo" class="team-img" id="teamPhoto">
                </div>`;
        html += `</div>`;
        
        leftContainer.innerHTML = html;

        // 團隊圖片點擊放大
        const teamPhoto = document.getElementById('teamPhoto');
        if (teamPhoto) {
            teamPhoto.addEventListener('click', (e) => {
                e.stopPropagation();
                modal.style.display = "flex";
                modalImg.src = teamPhoto.src;
            });
            teamPhoto.onerror = function() {
                if (!this.dataset.fallback) {
                    this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect width='800' height='400' fill='%23aaccf0'/%3E%3Ctext x='50%25' y='50%25' font-size='20' font-family='monospace' fill='%235a7f9e' text-anchor='middle' dy='.3em'%3E📸 团队图片%3C/text%3E%3C/svg%3E";
                    this.dataset.fallback = "true";
                }
            };
        }

        // 頭像錯誤處理
        document.querySelectorAll('.member-avatar').forEach(img => {
            img.onerror = function() {
                if (!this.dataset.fallback) {
                    this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 80 80'%3E%3Crect width='80' height='80' fill='%23aaccf0'/%3E%3Ctext x='50%25' y='50%25' font-size='12' font-family='monospace' fill='%235a7f9e' text-anchor='middle' dy='.3em'%3E📸%3C/text%3E%3C/svg%3E";
                    this.dataset.fallback = "true";
                }
            };
        });
    }

    // 渲染右側連結區塊
    function renderRight(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;
        const sections = data.rightLinks.sections;
        let html = '';
        sections.forEach(section => {
            html += `<div class="link-card">
                        <h3>${section.title}</h3>
                        <ul>`;
            section.links.forEach(link => {
                html += `<li><a href="${link.url}" target="_blank" rel="noopener noreferrer">${link.name}</a></li>`;
            });
            html += `</ul></div>`;
        });
        rightContainer.innerHTML = html;
    }

    // 切換語言主函式
    function renderLanguage(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;
        siteNameElem.innerText = data.siteName;
        renderLeft(langCode);
        renderRight(langCode);
        langBtns.forEach(btn => {
            const btnLang = btn.getAttribute('data-lang');
            if (btnLang === langCode) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    // 從 localStorage 或 URL 偵測語言
    function detectLanguageFromPrevious() {
        // 1. URL 參數優先
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang && (urlLang === 'zh' || urlLang === 'zh-TW' || urlLang === 'en')) {
            localStorage.setItem('srg_language_pref', urlLang);
            return urlLang;
        }
        // 2. 本地存儲記錄
        let savedLang = localStorage.getItem('srg_language_pref');
        if (savedLang && (savedLang === 'zh' || savedLang === 'zh-TW' || savedLang === 'en')) {
            return savedLang;
        }
        // 3. 瀏覽器語言偏好
        const navLang = navigator.language || navigator.userLanguage;
        if (navLang) {
            const lang = navLang.toLowerCase();
            if (lang.startsWith('zh-tw') || lang.startsWith('zh-hk') || lang.startsWith('zh-mo')) {
                return 'zh-TW';
            } else if (lang.startsWith('zh')) {
                return 'zh';
            } else if (lang.startsWith('en')) {
                return 'en';
            }
        }
        // 4. 默認簡體中文
        return 'zh';
    }

    let currentLang = 'zh';

    function setLanguage(langCode, updateStorage = true) {
        if (!LANGUAGE_DATA[langCode]) return;
        currentLang = langCode;
        renderLanguage(currentLang);
        if (updateStorage) {
            localStorage.setItem('srg_language_pref', currentLang);
        }
        if (langCode === 'zh') document.documentElement.lang = 'zh-CN';
        else if (langCode === 'zh-TW') document.documentElement.lang = 'zh-TW';
        else if (langCode === 'en') document.documentElement.lang = 'en';
    }

    function initLanguageByPrevious() {
        let initialLang = detectLanguageFromPrevious();
        if (!LANGUAGE_DATA[initialLang]) initialLang = 'zh';
        setLanguage(initialLang, true);
    }

    // 綁定語言切換事件
    function bindEvents() {
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const newLang = btn.getAttribute('data-lang');
                if (newLang && LANGUAGE_DATA[newLang]) {
                    setLanguage(newLang, true);
                }
            });
        });
    }

    // 模態框設定
    function setupModal() {
        const closeBtn = document.querySelector('#imageModal .close-modal');
        if (closeBtn) {
            closeBtn.addEventListener('click', () => {
                modal.style.display = "none";
            });
        }
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.style.display = "none";
            }
        });
    }

    // 橫幅圖片錯誤處理
    function handleBannerImage() {
        const bannerImg = document.querySelector('.hero-banner img');
        if (bannerImg) {
            bannerImg.onerror = function() {
                if (!this.dataset.fallbackSet) {
                    this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 200'%3E%3Crect width='1200' height='200' fill='%236aa9d9'/%3E%3Ctext x='50%25' y='50%25' font-size='20' font-family='monospace' fill='%23ffffff' text-anchor='middle' dy='.3em'%3E📸 替换图片: placeholder-banner.jpg%3C/text%3E%3C/svg%3E";
                    this.dataset.fallbackSet = "true";
                }
            };
        }
    }

    // 初始化
    window.addEventListener('DOMContentLoaded', () => {
        initLanguageByPrevious();
        bindEvents();
        handleBannerImage();
        setupModal();
        console.log("%c 申訴協助頁面已更新（成員順序已互換：服主在左，市長在右）", "color: #2a6d8f; font-size: 14px;");
    });
</script>
</body>
</html>
