<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SRG桃源服务器 | 资讯中心</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        @font-face {
            font-family: 'UnifontPixel';
            src: url('font/Unifont13.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'UnifontPixel', 'Courier New', 'VT323', monospace;
            background-color: #b8dcff;
            min-height: 100vh;
            padding: 24px 32px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 20px 20px, #a0c8f0 12px, transparent 12px);
            background-size: 80px 80px;
            background-color: #cfe6ff;
            background-repeat: repeat;
            animation: diagonalMoveLeftUp 22s linear infinite;
            opacity: 0.65;
        }

        @keyframes diagonalMoveLeftUp {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: -200px -200px;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(248, 250, 255, 0.92);
            backdrop-filter: blur(3px);
            border: 4px solid #5d9ac9;
            box-shadow: 12px 12px 0px 0px rgba(47, 79, 109, 0.3);
            padding: 20px 28px 40px 28px;
            transition: all 0.2s;
        }

        .hero-banner {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            border: 3px solid #3f7eb6;
            margin-bottom: 28px;
            background: #85b9e0;
            box-shadow: 6px 6px 0px #2f5a7a;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: auto;
        }

        .site-title-overlay {
            position: absolute;
            left: 20px;
            bottom: 18px;
            background: rgba(31, 65, 98, 0.85);
            padding: 6px 18px;
            border-right: 4px solid #ffd966;
            border-bottom: 4px solid #ffb347;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'UnifontPixel', monospace;
            text-transform: uppercase;
            color: #f0fcff;
            text-shadow: 3px 3px 0 #1f3f5c;
            backdrop-filter: blur(4px);
        }

        .back-home-btn {
            display: inline-block;
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .back-home-btn:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
        }
        .lang-btn.active {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            box-shadow: inset 1px 1px 0px #ad6d2a;
        }
        .lang-btn:hover {
            background: #fee3b5;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        .news-header {
            text-align: center;
            margin: 20px 0 30px;
        }
        .news-header h2 {
            font-size: 2.2rem;
            display: inline-block;
            background: #cde5ff;
            padding: 8px 30px;
            border-top: 4px solid #ffb347;
            border-bottom: 4px solid #ffb347;
            letter-spacing: 2px;
            color: #1e557a;
        }

        .featured-card {
            background: rgba(255, 253, 245, 0.96);
            border: 3px solid #5d9ac9;
            box-shadow: 8px 8px 0px #a1c2e0;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            transition: transform 0.1s;
        }
        .featured-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px #8fb4d4;
        }
        .featured-img {
            flex: 1.2;
            min-width: 240px;
            background: #7ba5c4;
        }
        .featured-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-right: 2px solid #5d9ac9;
        }
        .featured-content {
            flex: 2;
            padding: 24px;
        }
        .featured-content h3 {
            font-size: 1.8rem;
            border-left: 10px solid #ffb347;
            padding-left: 15px;
            margin-bottom: 12px;
            color: #1e4a6e;
        }
        .featured-meta {
            font-size: 0.8rem;
            color: #5f7f9a;
            margin-bottom: 16px;
            border-bottom: 1px dotted #9cbedc;
            padding-bottom: 6px;
        }
        .featured-content p {
            line-height: 1.6;
            color: #1e3b4f;
            margin-bottom: 20px;
        }
        .read-more {
            display: inline-block;
            background: #e6f0ff;
            border: 2px solid #4982b0;
            padding: 5px 16px;
            font-family: monospace;
            font-weight: bold;
            text-decoration: none;
            color: #1f5a7e;
            transition: 0.05s;
        }
        .read-more:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            transform: translate(-1px, -1px);
            box-shadow: 2px 2px 0 #7ba2c4;
        }

        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            margin-top: 20px;
            margin-bottom: 30px;
        }
        .news-card {
            background: rgba(255, 253, 245, 0.96);
            border: 3px solid #5d9ac9;
            box-shadow: 6px 6px 0px #a1c2e0;
            transition: 0.1s linear;
            display: flex;
            flex-direction: column;
        }
        .news-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 10px 10px 0px #8fb4d4;
        }
        .news-img {
            width: 100%;
            height: 180px;
            background: #7ba5c4;
            overflow: hidden;
        }
        .news-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.2s;
        }
        .news-card:hover .news-img img {
            transform: scale(1.02);
        }
        .news-content {
            padding: 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .news-content h4 {
            font-size: 1.4rem;
            color: #1e4a6e;
            margin-bottom: 10px;
            border-left: 6px solid #ffb347;
            padding-left: 12px;
        }
        .news-date {
            font-size: 0.7rem;
            color: #5f7f9a;
            margin-bottom: 12px;
        }
        .news-excerpt {
            line-height: 1.5;
            color: #1e3b4f;
            margin-bottom: 16px;
            flex: 1;
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.75rem;
            border-top: 2px solid #9cbedc;
            padding-top: 20px;
            color: #2f6c8f;
            letter-spacing: 1px;
        }
        .blink-pixel {
            animation: blink 1.2s step-end infinite;
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 780px) {
            body {
                padding: 16px;
            }
            .hero-banner {
                height: 130px;
            }
            .site-title-overlay {
                font-size: 1.2rem;
                bottom: 8px;
                left: 12px;
            }
            .featured-card {
                flex-direction: column;
            }
            .featured-img img {
                max-height: 220px;
                width: 100%;
            }
            .news-grid {
                grid-template-columns: 1fr;
            }
        }

        ::-webkit-scrollbar {
            width: 12px;
            background: #caddf0;
        }
        ::-webkit-scrollbar-thumb {
            background: #5f93bb;
            border: 1px solid #bfd6f0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switch">
        <button class="lang-btn" data-lang="zh">简体中文</button>
        <button class="lang-btn" data-lang="zh-TW">繁體中文</button>
        <button class="lang-btn" data-lang="en">ENGLISH</button>
    </div>

    <div class="hero-banner">
        <img src="placeholder-banner.jpg" alt="SRG Banner" onerror="this.src='https://placehold.co/1200x300/6aa9d9/white?text=Replace+Me+in+root'">
        <div class="site-title-overlay" id="siteNameOverlay"> SRG 资讯 </div>

    <a href="index.html" class="back-home-btn" id="backHomeBtn">← 返回首页</a>

    <div id="newsContent">

    <footer>

        持续更新 | 关注公告

</div>

<script>
    const NEWS_DATA = {

                link: "#"
            },
            cards: [
                {
                    img: "image/news/news1_zh.jpg",
                    title: "社区建筑大赛获奖名单公布",
                    date: "2026年6月10日",
                    excerpt: "经过两周的激烈角逐，『蒸汽工坊』团队获得一等奖，奖品为限定称号+10000金币。"
                },
                {
                    img: "image/news/news2_zh.jpg",
                    title: "服务器资源世界今日重置",
                    date: "2026年6月5日",
                    excerpt: "资源世界已完全重置，矿物分布全新生成，欢迎各位玩家前往采集。"
                },
                {
                    img: "image/news/news3_zh.jpg",
                    title: "公益赞助计划启动",
                    date: "2026年5月28日",
                    excerpt: "为支持服务器长期运营，开启自愿赞助通道，赞助将用于升级硬件与活动奖品。"
                },
                {
                    img: "image/news/news4_zh.jpg",
                    title: "新玩家引导系统上线",
                    date: "2026年5月20日",
                    excerpt: "新增新手任务与指引NPC，帮助新玩家快速上手，完成全部任务可领取初始物资包。"
                },
                {
                    img: "image/news/news5_zh.jpg",
                    title: "端午龙舟赛活动回顾",
                    date: "2026年5月15日",
                    excerpt: "首届龙舟赛圆满结束，冠军队伍获得限定旗帜。感谢大家的热情参与！"
                },
                {
                    img: "image/news/news6_zh.jpg",
                    title: "开发者访谈: 未来计划",
                    date: "2026年5月8日",
                    excerpt: "服主DeityMan透露下半年将加入自定义附魔与宠物系统，敬请期待。"
                }
            ]
        },
        "zh-TW": {
            siteName: " SRG 資訊 ",
            backBtn: "← 返回首頁",
            headerTitle: "伺服器動態",
            featured: {
                image: "image/news/featured_tc.jpg",
                title: "桃源2.0夏季大更新即將到來！",
                date: "2026年6月15日",
                summary: "全新地形、地底遺跡、公會系統全面升級。本次更新將於7月1日正式上線，屆時會有一週的雙倍經驗活動。",
                link: "#"
            },
            cards: [
                {
                    img: "image/news/news1_tc.jpg",
                    title: "社區建築大賽獲獎名單公佈",
                    date: "2026年6月10日",
                    excerpt: "經過兩週的激烈角逐，『蒸汽工坊』團隊獲得一等獎，獎品為限定稱號+10000金幣。"
                },
                {
                    img: "image/news/news2_tc.jpg",
                    title: "伺服器資源世界今日重置",
                    date: "2026年6月5日",
                    excerpt: "資源世界已完全重置，礦物分佈全新生成，歡迎各位玩家前往採集。"
                },
                {
                    img: "image/news/news3_tc.jpg",
                    title: "公益贊助計劃啟動",
                    date: "2026年5月28日",
                    excerpt: "為支持伺服器長期運營，開啟自願贊助通道，贊助將用於升級硬體與活動獎品。"
                },
                {
                    img: "image/news/news4_tc.jpg",
                    title: "新玩家引導系統上線",
                    date: "2026年5月20日",
                    excerpt: "新增新手任務與指引NPC，幫助新玩家快速上手，完成全部任務可領取初始物資包。"
                },
                {
                    img: "image/news/news5_tc.jpg",
                    title: "端午龍舟賽活動回顧",
                    date: "2026年5月15日",
                    excerpt: "首屆龍舟賽圓滿結束，冠軍隊伍獲得限定旗幟。感謝大家的熱情參與！"
                },
                {
                    img: "image/news/news6_tc.jpg",
                    title: "開發者訪談: 未來計劃",
                    date: "2026年5月8日",
                    excerpt: "服主DeityMan透露下半年將加入自訂附魔與寵物系統，敬請期待。"
                }
            ]
        },
        "en": {
            siteName: " SRG News ",
            backBtn: "← Home",
            headerTitle: "Server Updates",
            featured: {
                image: "image/news/featured_en.jpg",
                title: "Taoyuan 2.0 Summer Update Coming Soon!",
                date: "June 15, 2026",
                summary: "New terrains, underground ruins, and guild system overhaul. The update goes live on July 1st with a week-long double XP event.",
                link: "#"
            },
            cards: [
                {
                    img: "image/news/news1_en.jpg",
                    title: "Community Building Contest Winners Announced",
                    date: "June 10, 2026",
                    excerpt: "After two weeks of competition, the 'Steam Workshop' team won first prize: limited title + 10,000 coins."
                },
                {
                    img: "image/news/news2_en.jpg",
                    title: "Resource World Reset Today",
                    date: "June 5, 2026",
                    excerpt: "The resource world has been fully reset with fresh ore generation. Welcome to gather."
                },
                {
                    img: "image/news/news3_en.jpg",
                    title: "Donation Program Launched",
                    date: "May 28, 2026",
                    excerpt: "Voluntary donations to support server hardware and event prizes are now open."
                },
                {
                    img: "image/news/news4_en.jpg",
                    title: "New Player Guide System Online",
                    date: "May 20, 2026",
                    excerpt: "Newbie quests and guide NPCs added. Complete all tasks to receive starter supplies."
                },
                {
                    img: "image/news/news5_en.jpg",
                    title: "Dragon Boat Festival Race Recap",
                    date: "May 15, 2026",
                    excerpt: "The first dragon boat race ended successfully. The champion team received a exclusive banner."
                },
                {
                    img: "image/news/news6_en.jpg",
                    title: "Dev Interview: Future Plans",
                    date: "May 8, 2026",
                    excerpt: "Owner DeityMan revealed custom enchantments and pet system coming later this year."
                }
            ]
        }
    };

    const siteNameElem = document.getElementById('siteNameOverlay');
    const newsContainer = document.getElementById('newsContent');
    const backBtn = document.getElementById('backHomeBtn');
    const langBtns = document.querySelectorAll('.lang-btn');

    function renderNews(langCode) {
        const data = NEWS_DATA[langCode];
        if (!data) return;
        siteNameElem.innerText = data.siteName;
        if (backBtn) backBtn.innerText = data.backBtn;

        let html = `
            <div class="news-header">
                <h2>${data.headerTitle}</h2>
            </div>
            <div class="featured-card">
                <div class="featured-img">
                    <img src="${data.featured.image}" alt="featured" onerror="this.src='https://placehold.co/800x400/6aa9d9/white?text=Featured+Image'">
                </div>
                <div class="featured-content">
                    <h3>${data.featured.title}</h3>
                    <div class="featured-meta"> ${data.featured.date}</div>
                    <p>${data.featured.summary}</p>
                    <a href="${data.featured.link}" class="read-more" target="_blank">阅读全文 →</a>
                </div>
            </div>
            <div class="news-grid">
        `;
        data.cards.forEach(card => {
            html += `
                <div class="news-card">
                    <div class="news-img">
                        <img src="${card.img}" alt="${card.title}" onerror="this.src='https://placehold.co/400x200/aad0f0/white?text=Image'">
                    </div>
                    <div class="news-content">
                        <h4>${card.title}</h4>
                        <div class="news-date"> ${card.date}</div>
                        <div class="news-excerpt">${card.excerpt}</div>
                        <a href="#" class="read-more" style="align-self: flex-start;">阅读更多 →</a>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        newsContainer.innerHTML = html;
    }

    function detectLanguageFromPrevious() {
        let savedLang = localStorage.getItem('y2k_universe_lang');
        if (savedLang && (savedLang === 'zh' || savedLang === 'zh-TW' || savedLang === 'en')) {
            return savedLang;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang && (urlLang === 'zh' || urlLang === 'zh-TW' || urlLang === 'en')) {
            localStorage.setItem('y2k_universe_lang', urlLang);
            return urlLang;
        }
        return 'zh';
    }

    let currentLang = 'zh';

    function setLanguage(langCode, updateStorage = true) {
        if (!NEWS_DATA[langCode]) return;
        currentLang = langCode;
        renderNews(currentLang);
        langBtns.forEach(btn => {
            const btnLang = btn.getAttribute('data-lang');
            if (btnLang === langCode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (updateStorage) {
            localStorage.setItem('y2k_universe_lang', currentLang);
        }
        if (langCode === 'zh') document.documentElement.lang = 'zh-CN';
        else if (langCode === 'zh-TW') document.documentElement.lang = 'zh-TW';
        else if (langCode === 'en') document.documentElement.lang = 'en';
    }

    function initLanguage() {
        let initialLang = detectLanguageFromPrevious();
        if (!NEWS_DATA[initialLang]) initialLang = 'zh';
        setLanguage(initialLang, true);
    }

    function bindEvents() {
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const newLang = btn.getAttribute('data-lang');
                if (newLang && NEWS_DATA[newLang]) {
                    setLanguage(newLang, true);
                }
            });
        });
    }

    function handleBannerImage() {
        const bannerImg = document.querySelector('.hero-banner img');
        if (bannerImg) {
            bannerImg.onerror = function() {
                if (!this.dataset.fallbackSet) {
                    this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 200'%3E%3Crect width='1200' height='200' fill='%236aa9d9'/%3E%3Ctext x='50%25' y='50%25' font-size='20' font-family='monospace' fill='%23ffffff' text-anchor='middle' dy='.3em'%3E 替换图片: placeholder-banner.jpg%3C/text%3E%3C/svg%3E";
                    this.dataset.fallbackSet = "true";
                }
            };
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        initLanguage();
        bindEvents();
        handleBannerImage();
        console.log("%c SRG 资讯页面已启动 · 粗波点Y2K风格 · 三语言自动切换 ", "color: #2a6d8f; font-size: 14px;");
    });
</script>
</body>
</html>
