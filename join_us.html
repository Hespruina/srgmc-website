<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SRG桃源服务器 | 加入游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        @font-face {
            font-family: 'UnifontPixel';
            src: url('font/Unifont13.0.01.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'UnifontPixel', 'Courier New', 'VT323', monospace;
            background-color: #b8dcff;
            min-height: 100vh;
            padding: 24px 32px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 20px 20px, #a0c8f0 12px, transparent 12px);
            background-size: 80px 80px;
            background-color: #cfe6ff;
            background-repeat: repeat;
            animation: diagonalMoveLeftUp 22s linear infinite;
            opacity: 0.65;
        }

        @keyframes diagonalMoveLeftUp {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: -200px -200px;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(248, 250, 255, 0.92);
            backdrop-filter: blur(3px);
            border: 4px solid #5d9ac9;
            box-shadow: 12px 12px 0px 0px rgba(47, 79, 109, 0.3);
            padding: 20px 24px 30px 24px;
            transition: all 0.2s;
        }

        hr {
            border: none;
            height: 3px;
            background: repeating-linear-gradient(90deg, #5d9ac9, #5d9ac9 12px, #b3d4ff 12px, #b3d4ff 24px);
            margin: 12px 0;
        }

        .hero-banner {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            border: 3px solid #3f7eb6;
            margin-bottom: 28px;
            background: #85b9e0;
            box-shadow: 6px 6px 0px #2f5a7a;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: auto;
        }

        .site-title-overlay {
            position: absolute;
            left: 20px;
            bottom: 18px;
            background: rgba(31, 65, 98, 0.85);
            padding: 6px 18px;
            border-right: 4px solid #ffd966;
            border-bottom: 4px solid #ffb347;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'UnifontPixel', monospace;
            text-transform: uppercase;
            color: #f0fcff;
            text-shadow: 3px 3px 0 #1f3f5c;
            backdrop-filter: blur(4px);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 4fr 1fr;
            gap: 28px;
            margin: 20px 0 25px;
        }

        .left-bigbox {
            background: rgba(252, 253, 255, 0.94);
            border: 3px solid #5d9ac9;
            padding: 20px;
            box-shadow: 5px 5px 0px #b8d2ed;
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }

        .left-text-area {
            flex: 3;
            min-width: 180px;
        }

        .left-image-area {
            flex: 1;
            min-width: 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        .left-text-area h2 {
            font-size: 1.8rem;
            border-left: 12px solid #ffb347;
            padding-left: 15px;
            margin-bottom: 18px;
            color: #1e4a6e;
            font-family: 'UnifontPixel', monospace;
        }

        .left-text-area p {
            margin-bottom: 18px;
            line-height: 1.5;
            color: #1e3b4f;
            font-size: 1rem;
        }

        .info-block {
            margin-top: 28px;
            border-top: 2px dotted #9cbedc;
            padding-top: 12px;
        }
        .info-block h3 {
            font-size: 1.6rem;
            border-left: 12px solid #ffb347;
            padding-left: 15px;
            margin-bottom: 18px;
            color: #1e4a6e;
            font-family: 'UnifontPixel', monospace;
        }
        .info-block p {
            margin-bottom: 18px;
            line-height: 1.5;
            color: #1e3b4f;
            font-size: 1rem;
        }

        .clickable-link {
            color: #cc7b2c;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 1px dashed #cc7b2c;
            transition: all 0.1s;
        }
        .clickable-link:hover {
            background: #ffe1b3;
            transform: scale(1.02);
            display: inline-block;
        }

        .gif-btn {
            display: inline-block;
            margin: 12px 0 20px 0;
            border: 2px solid #5d9ac9;
            box-shadow: 3px 3px 0 #8bb3ce;
            transition: 0.05s linear;
            cursor: pointer;
        }
        .gif-btn img {
            width: 88px;
            height: 31px;
            display: block;
            image-rendering: crisp-edges;
        }
        .gif-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 #5d9ac9;
        }

        .back-home-btn {
            display: inline-block;
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .back-home-btn:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        .portrait-img {
            width: 100%;
            max-width: 180px;
            height: auto;
            aspect-ratio: 1125 / 2505;
            object-fit: cover;
            border: 2px solid #5d9ac9;
            box-shadow: 4px 4px 0px #89b3d6;
            display: block;
            image-rendering: auto;
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .portrait-img:hover {
            transform: scale(1.05);
            z-index: 5;
            position: relative;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border: 4px solid #ffd966;
            box-shadow: 0 0 30px #ffb347;
        }
        .close-modal {
            position: absolute;
            top: 20px;
            right: 40px;
            color: #ffd966;
            font-size: 48px;
            font-weight: bold;
            transition: 0.2s;
            cursor: pointer;
            font-family: monospace;
            background: rgba(0,0,0,0.5);
            padding: 0 12px;
            border-radius: 8px;
        }
        .close-modal:hover {
            color: #ffb347;
            transform: scale(1.1);
        }

        .custom-dialog {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            cursor: default;
        }
        .dialog-box {
            background: #fef7e8;
            border: 4px solid #5d9ac9;
            box-shadow: 12px 12px 0px rgba(47, 79, 109, 0.4);
            padding: 24px;
            max-width: 480px;
            width: 85%;
            font-family: 'UnifontPixel', monospace;
            color: #1e3b4f;
            position: relative;
        }
        .dialog-box h3 {
            font-size: 1.6rem;
            border-left: 8px solid #ffb347;
            padding-left: 12px;
            margin-bottom: 20px;
        }
        .dialog-content {
            margin: 20px 0;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #eef3fc;
            border: 1px solid #9bbfd8;
            padding: 10px 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .info-text {
            font-size: 1rem;
            word-break: break-all;
            flex: 1;
        }
        .copy-btn {
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 4px 12px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
        }
        .copy-btn:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            transform: translate(-1px, -1px);
            box-shadow: 3px 3px 0px #7ba2c4;
        }
        .close-dialog {
            position: absolute;
            top: 12px;
            right: 18px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            color: #b85c1a;
            background: #ffe0b5;
            width: 32px;
            height: 32px;
            text-align: center;
            line-height: 28px;
            border-radius: 4px;
        }
        .close-dialog:hover {
            background: #ffb347;
            color: white;
        }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2e5a3a;
            color: #f0fcff;
            font-family: monospace;
            padding: 8px 16px;
            border: 2px solid #ffd966;
            z-index: 10001;
            display: none;
            white-space: nowrap;
        }

        .right-smallbox {
            background: rgba(248, 252, 255, 0.96);
            border: 3px solid #5d9ac9;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            box-shadow: 5px 5px 0px #a1c2e0;
        }

        .link-card {
            border-bottom: 2px dotted #8fb4d4;
            padding-bottom: 14px;
        }

        .link-card h3 {
            font-size: 1.4rem;
            background: #cde5ff;
            display: inline-block;
            padding: 4px 12px;
            margin-bottom: 14px;
            border-top: 2px solid #ffbc6e;
            color: #1e557a;
            font-family: 'UnifontPixel', monospace;
        }

        .link-card ul {
            list-style: none;
            padding-left: 8px;
        }

        .link-card li {
            margin: 12px 0;
        }

        .link-card li a {
            color: #2d6a8f;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dotted #8bb3ce;
            transition: all 0.1s;
            display: inline-block;
        }

        .link-card li a:hover {
            color: #cc7b2c;
            border-bottom-color: #cc7b2c;
            transform: translate(-2px, -2px);
            text-shadow: 1px 1px 0 #eef4ff;
        }

        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
        }

        .lang-btn.active {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            box-shadow: inset 1px 1px 0px #ad6d2a;
        }

        .lang-btn:hover {
            background: #fee3b5;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            border-top: 2px solid #9cbedc;
            padding-top: 18px;
            color: #2f6c8f;
            letter-spacing: 1px;
        }

        .blink-pixel {
            animation: blink 1.2s step-end infinite;
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 860px) {
            body {
                padding: 16px;
            }
            .content-grid {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .left-bigbox {
                flex-direction: column;
            }
            .left-image-area {
                align-items: center;
                margin-top: 12px;
            }
            .portrait-img {
                max-width: 140px;
            }
            .hero-banner {
                height: 130px;
            }
            .site-title-overlay {
                font-size: 1.2rem;
                bottom: 8px;
                left: 12px;
            }
            .modal-content {
                max-width: 95%;
            }
            .dialog-box {
                width: 90%;
                padding: 16px;
            }
            .info-row {
                flex-direction: column;
                align-items: flex-start;
            }
            .copy-btn {
                align-self: flex-end;
            }
        }

        ::-webkit-scrollbar {
            width: 12px;
            background: #caddf0;
        }
        ::-webkit-scrollbar-thumb {
            background: #5f93bb;
            border: 1px solid #bfd6f0;
        }
    </style>
</head>

</div>

<script>
    const LANGUAGE_DATA = {

            step3: {

                    "· 在群內，輸入「/bind '你的minecraft遊玩名稱』 (離線正版皆可)",
                    "· 連接群公告的地址，第一次玩輸入「/register '你的密碼』『你的密碼』」註冊遊戲帳戶",

    const siteNameElem = document.getElementById('siteNameOverlay');
    const leftTextContainer = document.getElementById('leftTextContent');
    const rightLinkContainer = document.getElementById('rightLinkContent');
    const langBtns = document.querySelectorAll('.lang-btn');
    const portraitImg = document.getElementById('portraitImage');
    const modal = document.getElementById('imageModal');
    const modalImg = document.getElementById('modalImg');
    const qqDialog = document.getElementById('qqDialog');
    const closeDialogBtn = document.querySelector('#qqDialog .close-dialog');
    const toast = document.getElementById('copyToast');

    function showQQDialog() {
        qqDialog.style.display = "flex";
    }
    function hideQQDialog() {
        qqDialog.style.display = "none";
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 1500);
        }).catch(() => {
            alert("复制失败，请手动复制");
        });
    }

    function enhanceStep2Links() {
        const allBlocks = document.querySelectorAll('.info-block');
        let targetBlock = null;
        for (let block of allBlocks) {
            const h3 = block.querySelector('h3');
            if (h3 && (h3.innerText.includes('第二步') || h3.innerText.includes('Step 2') || h3.innerText.includes('加入群组') || h3.innerText.includes('Join Group'))) {
                targetBlock = block;
                break;
            }
        }
        if (!targetBlock) return;
        const paragraphs = targetBlock.querySelectorAll('p');
        for (let p of paragraphs) {
            if (p.innerText.includes('[点击此处]') || p.innerText.includes('[點擊此處]') || p.innerText.includes('[Click here]')) {
                const html = p.innerHTML;
                const newHtml = html.replace(/\[点击此处\]|\[點擊此處\]|\[Click here\]/g, '<span class="clickable-link">[点击此处]</span>');
                p.innerHTML = newHtml;
                const linkSpan = p.querySelector('.clickable-link');
                if (linkSpan) {
                    linkSpan.addEventListener('click', (e) => {
                        e.stopPropagation();
                        showQQDialog();
                    });
                }
                break;
            }
        }
    }

    function renderLeftText(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;
        let html = `<a href="index.html" class="back-home-btn">${data.backBtn}</a>
                <div class="step-block">
                    <h2>${data.step1.title}</h2>
                    <div class="gif-btn" id="gifLinkButton">
                        <img src="image/other/dm_b.gif" alt="${data.gifAlt}" style="width:88px; height:31px;">
                    </div>`;
        data.step1.paragraphs.forEach(p => {
            html += `<p>${p}</p>`;
        });
        html += `</div>`;

        html += `<div class="info-block">
                    <h3>${data.step2.title}</h3>`;
        data.step2.paragraphs.forEach(p => {
            html += `<p>${p}</p>`;
        });
        html += `</div>`;

        html += `<div class="info-block">
                    <h3>${data.step3.title}</h3>`;
        data.step3.paragraphs.forEach(p => {
            html += `<p>${p}</p>`;
        });
        html += `</div>`;

        leftTextContainer.innerHTML = html;

        const gifBtnDiv = document.getElementById('gifLinkButton');
        if (gifBtnDiv) {
            gifBtnDiv.addEventListener('click', () => {
                window.open('https://space.bilibili.com/3546948277635233?spm_id_from=333.337.search-card.all.click', '_blank');
            });
        }

        enhanceStep2Links();
    }

    function renderRightLinks(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;
        const sections = data.rightLinks.sections;
        let html = '';
        sections.forEach(section => {
            html += `<div class="link-card">
                        <h3>${section.title}</h3>
                        <ul>`;
            section.links.forEach(link => {
                html += `<li><a href="${link.url}" target="_blank" rel="noopener noreferrer">${link.name}</a></li>`;
            });
            html += `</ul></div>`;
        });
        rightLinkContainer.innerHTML = html;
    }

    function renderLanguage(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;
        siteNameElem.innerText = data.siteName;
        renderLeftText(langCode);
        renderRightLinks(langCode);
        langBtns.forEach(btn => {
            const btnLang = btn.getAttribute('data-lang');
            if (btnLang === langCode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    function detectLanguageFromPrevious() {
        // 1. URL 參數優先
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang && (urlLang === 'zh' || urlLang === 'zh-TW' || urlLang === 'en')) {
            localStorage.setItem('srg_language_pref', urlLang);
            return urlLang;
        }
        // 2. 本地存儲記錄
        let savedLang = localStorage.getItem('srg_language_pref');
        if (savedLang && (savedLang === 'zh' || savedLang === 'zh-TW' || savedLang === 'en')) {
            return savedLang;
        }
        // 3. 瀏覽器語言偏好
        const navLang = navigator.language || navigator.userLanguage;
        if (navLang) {
            const lang = navLang.toLowerCase();
            if (lang.startsWith('zh-tw') || lang.startsWith('zh-hk') || lang.startsWith('zh-mo')) {
                return 'zh-TW';
            } else if (lang.startsWith('zh')) {
                return 'zh';
            } else if (lang.startsWith('en')) {
                return 'en';
            }
        }
        // 4. 默認簡體中文
        return 'zh';
    }

    let currentLang = 'zh';

    function setLanguage(langCode, updateStorage = true) {
        if (!LANGUAGE_DATA[langCode]) return;
        currentLang = langCode;
        renderLanguage(currentLang);
        if (updateStorage) localStorage.setItem('srg_language_pref', currentLang);
        if (langCode === 'zh') document.documentElement.lang = 'zh-CN';
        else if (langCode === 'zh-TW') document.documentElement.lang = 'zh-TW';
        else if (langCode === 'en') document.documentElement.lang = 'en';
    }

    function initLanguageByPrevious() {
        let initialLang = detectLanguageFromPrevious();
        if (!LANGUAGE_DATA[initialLang]) initialLang = 'zh';
        setLanguage(initialLang, true);
    }

    function bindEvents() {
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const newLang = btn.getAttribute('data-lang');
                if (newLang && LANGUAGE_DATA[newLang]) setLanguage(newLang, true);
            });
        });
    }

    function setupImageModal() {
        if (!portraitImg) return;
        portraitImg.addEventListener('click', () => {
            modal.style.display = "flex";
            modalImg.src = portraitImg.src;
        });
        const closeModalBtn = document.querySelector('#imageModal .close-modal');
        if (closeModalBtn) closeModalBtn.addEventListener('click', () => modal.style.display = "none");
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = "none"; });
        portraitImg.onerror = function() {
            if (!this.dataset.fallbackPortrait) {
                this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 300 668'%3E%3Crect width='300' height='668' fill='%23aaccf0'/%3E%3Ctext x='50%25' y='50%25' font-size='14' font-family='monospace' fill='%234d6e8f' text-anchor='middle' dy='.3em'%3Eimage/srg_enter.jpg%3C/text%3E%3C/svg%3E";
                this.dataset.fallbackPortrait = "true";
            }
        };
    }

    function handleBannerImage() {
        const bannerImg = document.querySelector('.hero-banner img');
        if (bannerImg) {
            bannerImg.onerror = function() {
                if (!this.dataset.fallbackSet) {
                    this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 200'%3E%3Crect width='1200' height='200' fill='%236aa9d9'/%3E%3Ctext x='50%25' y='50%25' font-size='20' font-family='monospace' fill='%23ffffff' text-anchor='middle' dy='.3em'%3E📸 替换图片: image/ch2.jpg%3C/text%3E%3C/svg%3E";
                    this.dataset.fallbackSet = "true";
                }
            };
        }
    }

    function initCopyButtons() {
        document.querySelectorAll('.copy-btn').forEach(btn => {
            btn.removeEventListener('click', btn._listener);
            const handler = (e) => {
                e.stopPropagation();
                const text = btn.getAttribute('data-clip');
                if (text) copyToClipboard(text);
            };
            btn.addEventListener('click', handler);
            btn._listener = handler;
        });
    }

    if (closeDialogBtn) closeDialogBtn.addEventListener('click', hideQQDialog);
    qqDialog.addEventListener('click', (e) => { if (e.target === qqDialog) hideQQDialog(); });

    window.addEventListener('DOMContentLoaded', () => {
        initLanguageByPrevious();
        bindEvents();
        handleBannerImage();
        setupImageModal();
        initCopyButtons();
        const observer = new MutationObserver(() => initCopyButtons());
        observer.observe(leftTextContainer, { childList: true, subtree: true });
        console.log("%c✨ 修改完成：右侧“游戏指南”链接已指向 guide1.html，其他不变 ✨", "color: #2a6d8f; font-size: 14px;");
    });
</script>
</body>
</html>
