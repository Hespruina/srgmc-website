<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SRG桃源服务器 | 服规制度</title>
    <style>
        /* ========== 基础重置 & 像素字体 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        @font-face {
            font-family: 'UnifontPixel';
            src: url('font/Unifont13.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'UnifontPixel', 'Courier New', 'VT323', 'Fira Code', 'Monaco', monospace;
            background-color: #1f6e4a;
            min-height: 100vh;
            padding: 24px 32px;
            position: relative;
        }

        /* ========== 波点背景（斜向左上） ========== */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 15px 15px, #b3ffcf 2.5px, transparent 2.5px),
                              radial-gradient(circle at 45px 35px, #8cf0a7 1.8px, transparent 1.8px);
            background-size: 50px 50px, 80px 80px;
            background-color: #c9ffdb;
            background-repeat: repeat;
            animation: diagonalMoveLeftUp 18s linear infinite;
            opacity: 0.68;
        }

        @keyframes diagonalMoveLeftUp {
            0% {
                background-position: 0 0, 0 0;
            }
            100% {
                background-position: -120px -120px, -180px -180px;
            }
        }

        /* ========== 主容器 ========== */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(235, 255, 238, 0.88);
            backdrop-filter: blur(2px);
            border: 4px solid #2f9e62;
            box-shadow: 12px 12px 0px 0px rgba(28, 65, 43, 0.4);
            padding: 20px 24px 30px 24px;
            transition: all 0.2s;
        }

        hr {
            border: none;
            height: 3px;
            background: repeating-linear-gradient(90deg, #328f58, #328f58 10px, #b3e4c4 10px, #b3e4c4 20px);
            margin: 12px 0;
        }

        /* ========== 横幅Banner ========== */
        .hero-banner {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            border: 3px solid #247a4c;
            margin-bottom: 28px;
            background: #5fa07e;
            box-shadow: 6px 6px 0px #1e462f;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: auto;
        }

        .site-title-overlay {
            position: absolute;
            left: 20px;
            bottom: 18px;
            background: rgba(26, 68, 44, 0.85);
            padding: 6px 16px;
            border-right: 4px solid #7fe89b;
            border-bottom: 4px solid #308a54;
            font-size: 1.7rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'UnifontPixel', 'Courier New', monospace;
            text-transform: uppercase;
            color: #f0ffee;
            text-shadow: 3px 3px 0 #1f4c2d;
            backdrop-filter: blur(3px);
        }

        /* ========== 主网格布局 ========== */
        .content-grid {
            display: grid;
            grid-template-columns: 4fr 1fr;
            gap: 28px;
            margin: 20px 0 25px;
        }

        /* ========== 左侧大框 ========== */
        .left-bigbox {
            background: rgba(252, 253, 255, 0.94);
            border: 3px solid #3b8f60;
            padding: 22px 24px;
            box-shadow: 5px 5px 0px #b9ddcb;
            font-size: 1rem;
            line-height: 1.5;
        }

        .left-bigbox h2 {
            font-size: 1.9rem;
            border-left: 12px solid #ffb347;
            padding-left: 15px;
            margin-bottom: 20px;
            font-family: 'UnifontPixel', 'Courier New', monospace;
            letter-spacing: 1px;
            color: #1a5338;
            text-transform: uppercase;
        }

        .left-bigbox p {
            margin-bottom: 18px;
            color: #1e3f2e;
        }

        /* ========== PDF表格 ========== */
        .rules-table-wrapper {
            margin: 24px 0 12px 0;
            overflow-x: auto;
        }
        .download-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'UnifontPixel', 'Courier New', monospace;
            background: #f9fef5;
            border: 2px solid #4e946e;
            box-shadow: 3px 3px 0 #b5d1c1;
        }
        .download-table th, .download-table td {
            border: 1px solid #7bb692;
            padding: 10px 12px;
            text-align: left;
            font-size: 0.9rem;
        }
        .download-table th {
            background: #c3e3cf;
            color: #194e33;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .download-table td a {
            color: #226644;
            text-decoration: none;
            background: #e2f0e8;
            padding: 4px 12px;
            border: 1px solid #2f7a51;
            font-weight: bold;
            transition: 0.05s linear;
            display: inline-block;
            font-family: 'UnifontPixel', monospace;
        }
        .download-table td a:hover {
            background: #ffd966;
            color: #1d452f;
            border-color: #a5641a;
            transform: translate(-1px, -1px);
            box-shadow: 2px 2px 0 #8bb29b;
        }

        /* ========== 参考文章模块 ========== */
        .ref-divider {
            margin: 28px 0 18px 0;
            border: none;
            height: 3px;
            background: repeating-linear-gradient(90deg, #2f8b5b, #2f8b5b 8px, #b3e4c4 8px, #b3e4c4 16px);
        }

        .ref-title {
            font-size: 1.7rem;
            font-family: 'UnifontPixel', 'Courier New', monospace;
            color: #1a5338;
            border-left: 12px solid #ffb347;
            padding-left: 15px;
            margin: 10px 0 20px 0;
            letter-spacing: 2px;
        }

        .ref-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: flex-start;
        }

        .ref-card {
            flex: 1 0 calc(25% - 16px);
            min-width: 120px;
            max-width: 180px;
            background: #f4fcf7;
            border: 2px solid #3b8f60;
            padding: 8px;
            box-shadow: 3px 3px 0 #b9ddcb;
            cursor: pointer;
            transition: 0.1s;
            text-align: center;
        }
        .ref-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #8bb29b;
            border-color: #ffb347;
        }
        .ref-card img {
            width: 100%;
            height: auto;
            aspect-ratio: 2 / 3; /* 竖长比例 */
            object-fit: cover;
            border: 1px solid #2f7a51;
            display: block;
            background: #d4ecde;
            image-rendering: crisp-edges;
        }
        .ref-card .ref-label {
            margin-top: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #1d452f;
            word-break: break-word;
        }

        /* ========== 右侧小框 ========== */
        .right-smallbox {
            background: rgba(248, 252, 255, 0.96);
            border: 3px solid #419566;
            padding: 16px 12px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 5px 5px 0px #93bba7;
        }

        .info-card {
            border-bottom: 2px dotted #7fa28b;
            padding-bottom: 14px;
        }

        .info-card h3 {
            font-size: 1.3rem;
            background: #ddf3e4;
            display: inline-block;
            padding: 4px 10px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            border-top: 2px solid #c5ff6e;
            font-weight: bold;
            color: #195a37;
            font-family: 'UnifontPixel', monospace;
        }

        .info-card ul, .info-card .text-lines {
            list-style: none;
            padding-left: 8px;
        }

        .info-card li {
            margin: 8px 0;
            font-size: 0.9rem;
            padding-left: 20px;
            position: relative;
            word-break: break-word;
        }

        .info-card li a {
            color: #226644;
            text-decoration: none;
            border-bottom: 1px dotted #5b9879;
            transition: all 0.1s;
        }
        .info-card li a:hover {
            color: #b85c1a;
            border-bottom-color: #b85c1a;
            background: #faf0cf;
            padding: 2px 4px;
            margin: -2px -4px;
        }

        .info-card li::before {
            content: "📜";
            position: absolute;
            left: -2px;
            top: -1px;
            font-size: 0.8rem;
        }

        /* ========== 通用按钮 ========== */
        .back-home-btn {
            display: inline-block;
            background: #eef4fc;
            border: 2px solid #2f8b5b;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 6px 16px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1d5a3b;
            box-shadow: 2px 2px 0px #8abea1;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .back-home-btn:hover {
            background: #ffcd94;
            border-color: #b85c1a;
            color: #2e472a;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #629e7a;
        }

        /* ========== 语言切换 ========== */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .lang-btn {
            background: #eef4fc;
            border: 2px solid #2f8b5b;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1d5a3b;
            box-shadow: 2px 2px 0px #8abea1;
        }

        .lang-btn.active {
            background: #ffcd94;
            border-color: #b85c1a;
            color: #2e472a;
            box-shadow: inset 1px 1px 0px #75531e;
        }

        .lang-btn:hover {
            background: #cbe4fe;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #629e7a;
        }

        /* ========== 模态框（弹窗）—— 适配 A4 比例图片 ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(6px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #f3fcf6;
            border: 6px solid #2f8b5b;
            box-shadow: 16px 16px 0px #1f4c2d;
            padding: 24px 28px;
            max-width: 820px;      /* 足够容纳 A4 比例图片 (宽高比 ~1:1.414) */
            width: 92%;
            max-height: 92vh;
            overflow-y: auto;
            position: relative;
            cursor: default;
            font-family: 'UnifontPixel', 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .modal-close {
            position: absolute;
            top: 8px;
            right: 16px;
            font-size: 2.4rem;
            font-weight: bold;
            cursor: pointer;
            color: #2f6e47;
            background: none;
            border: none;
            line-height: 1;
            z-index: 10;
        }
        .modal-close:hover {
            color: #b85c1a;
        }
        .modal-box img {
            width: 100%;
            max-width: 700px;          /* 限制最大宽度，保持清晰 */
            height: auto;
            max-height: 68vh;          /* 限制高度，避免溢出 */
            object-fit: contain;
            border: 2px solid #3b8f60;
            margin-bottom: 16px;
            background: #fff;
            image-rendering: crisp-edges;
        }
        .modal-box h2 {
            color: #1a5338;
            border-left: 8px solid #ffb347;
            padding-left: 12px;
            margin-bottom: 12px;
            width: 100%;
            font-size: 1.4rem;
        }
        .modal-box .modal-desc {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #1e3f2e;
            margin: 12px 0 18px 0;
            width: 100%;
        }
        .modal-download-btn {
            display: inline-block;
            background: #ffcd94;
            border: 2px solid #b85c1a;
            padding: 8px 20px;
            font-weight: bold;
            color: #1d452f;
            text-decoration: none;
            box-shadow: 3px 3px 0 #8bb29b;
            transition: 0.05s;
            font-family: 'UnifontPixel', monospace;
            align-self: flex-start;
        }
        .modal-download-btn:hover {
            background: #f5b86e;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #629e7a;
        }

        /* ========== Footer ========== */
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            border-top: 2px solid #7db193;
            padding-top: 18px;
            color: #215a3b;
            letter-spacing: 1px;
        }

        .blink-pixel {
            animation: blink 1.2s step-end infinite;
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ========== 响应式 ========== */
        @media (max-width: 780px) {
            body { padding: 16px; }
            .content-grid { grid-template-columns: 1fr; gap: 24px; }
            .hero-banner { height: 130px; }
            .site-title-overlay { font-size: 1.1rem; bottom: 8px; left: 12px; }
            .ref-card { flex: 1 0 calc(50% - 16px); max-width: 160px; }
            .modal-box { padding: 16px; max-width: 96%; }
            .modal-box img { max-height: 55vh; }
        }
        @media (max-width: 480px) {
            .ref-card { flex: 1 0 100%; max-width: 100%; }
        }

        ::-webkit-scrollbar {
            width: 12px;
            background: #d4ecde;
        }
        ::-webkit-scrollbar-thumb {
            background: #468a63;
            border: 1px solid #aad0bb;
        }
    </style>
</head>

        const files = [
            {
                pdfName: "srg_criminal_law-sc.pdf",

                nameEn: "Guild & Corporation System Act",
                url: "https://drive.zhrhello.top/@s/I8C5WQsV"
            }
        ];

        let tableCaption = (langCode === "zh") ? " 规章PDF档案下载" :
                           (langCode === "zh-TW") ? " 規章PDF檔案下載" : " Regulation PDF Download";

        let tableHtml = `<div class="rules-table-wrapper"><table class="download-table">
                            <thead><tr><th>${tableCaption}</th><th> 下载</th></tr></thead>
                            <tbody>`;
        files.forEach(file => {
            let displayName = (langCode === "zh") ? file.nameZh :
                              (langCode === "zh-TW") ? file.nameZhTw : file.nameEn;
            tableHtml += `
                <tr>
                    <td>${displayName}</td>
                    <td><a href="${file.url}" target="_blank"> 获取PDF</a></td>
                </tr>
            `;
        });
        tableHtml += `</tbody></table></div>`;
        return tableHtml;
    }

    // ============================================================
    //  右侧 DOCX 下载映射 (原功能)
    // ============================================================
    const docxDownloadMap = [
        { path: "https://drive.zhrhello.top/@s/WY8P2Yab", defaultName: "self_criticism_form-sc.docx" },
        { path: "https://drive.zhrhello.top/@s/I2rMnyd0", defaultName: "msaf.docx" },
        { path: "https://drive.zhrhello.top/@s/umHQOImO", defaultName: "reportletter.docx" },
    ];

    // ============================================================
    //  参考文章数据 (四个，已实际填充)
    // ============================================================
    const articles = [
        {
            id: 1,
            title: "解读SRG民事规定.pdf",
            desc: "本文件详细阐释了SRG民事规定中的核心条款，涵盖财产权益、合同纠纷、玩家间责任划分等内容，是每位玩家的必备参考。",
            img: "rules_scl/aa/cc_aa.jpg",
            pdf: "https://drive.zhrhello.top/@s/CUu8FwzD",
            fileName: "解读SRG民事规定.pdf"
        },
        {
            id: 2,
            title: "解读SRG玩家行为守则.pdf",
            desc: "深入剖析玩家行为守则，包括日常行为规范、禁限事项、违规等级划分及对应的处理流程，帮助玩家更好地遵守规则。",
            img: "rules_scl/aa/cp_aa.jpg",
            pdf: "https://drive.zhrhello.top/@s/xFkGVXmA",
            fileName: "解读SRG玩家行为守则.pdf"
        },
        {
            id: 3,
            title: "SRG土地所有权制度研究",
            desc: "该体系在形式上确立了先占取得、圈地公示、登记对抗等基础制度，同时在实质上通过公共利益限制、相邻关系义务、除斥期间规则等机制对所有权权能施加了系统性约束。本文基于两部规范性文件的条文与释义，从取得要件、权能范围、变动规则、消灭事由及程序保障五个维度展开分析，旨在揭示该制度运作的内在逻辑与玩家须承担的程序性风险。",
            img: "rules_scl/aa/rolos.jpg",
            pdf: "https://drive.zhrhello.top/@s/4N2HqIKK",
            fileName: "SRG土地所有权制度研究.pdf"
        },
        {
            id: 4,
            title: "SRG红石生电机器制度研究",
            desc: "该制度以服务器整体运算资源（TPS）为客观入罪门槛，以行为人主观归责状态为处罚层级划分依据，同时设置了不作为犯、加重情节、自首减免及临时处分等程序性机制。本文从构成要件、归责体系、刑罚量处、竞合关系及程序保障五个维度展开分析，旨在揭示生电类玩家须遵守的技术规范边界与法律风险节点。",
            img: "rules_scl/aa/rrsrapm.jpg",
            pdf: "https://drive.zhrhello.top/@s/5HxT7o2r",
            fileName: "SRG红石生电机器管制制度研究.pdf"
        }
    ];

    // ============================================================
    //  渲染右侧小框 (将第二个section替换为参考文章链接)
    // ============================================================
    function renderRightColumn(data) {
        let rightHTML = '';
        data.right.sections.forEach((section, secIdx) => {
            rightHTML += `<div class="info-card"><h3>${section.title}</h3><ul>`;
            if (secIdx === 0) {
                // 第一个section：使用原有的docx映射
                section.items.forEach((item, idx) => {
                    const map = docxDownloadMap[idx];
                    if (map) {
                        rightHTML += `<li><a href="${map.path}" target="_blank">${item}</a></li>`;
                    } else {
                        rightHTML += `<li>${item}</li>`;
                    }
                });
            } else {
                // 第二个section：替换为参考文章的PDF下载链接 (使用articles数据)
                articles.forEach(article => {
                    // 提取显示名称（去掉.pdf后缀，保留完整标题）
                    let displayName = article.title;
                    // 如果标题以.pdf结尾，可保留，也可去掉，这里保留原样
                    rightHTML += `<li><a href="${article.pdf}" target="_blank">${displayName}</a></li>`;
                });
            }
            rightHTML += `</ul></div>`;
        });
        return rightHTML;
    }

    // ============================================================
    //  渲染左侧大框 (整合 PDF表格 + 参考文章)
    // ============================================================
    function renderLanguage(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;

        // 更新横幅标题
        document.getElementById('siteNameOverlay').innerText = data.siteName;

        // 构造左侧内容
        let leftHTML = `<a href="index.html" class="back-home-btn">${data.backBtn}</a>`;
        leftHTML += `<h2>${data.left.title}</h2>`;
        data.left.paragraphs.forEach(para => {
            leftHTML += `<p>${para}</p>`;
        });
        // PDF表格
        leftHTML += generatePdfTable(langCode);

        // ---- 添加分界线 ----
        leftHTML += `<hr class="ref-divider">`;

        // ---- 参考文章模块 ----
        leftHTML += `<div class="ref-title">· 参考文章</div>`;
        leftHTML += `<div class="ref-grid">`;
        articles.forEach((article, idx) => {
            leftHTML += `
                <div class="ref-card" data-article-index="${idx}">
                    <img src="${article.img}" alt="${article.title}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 150%22%3E%3Crect width=%22100%22 height=%22150%22 fill=%22%23c9e3d4%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 font-size=%2212%22 fill=%22%23366b4d%22 text-anchor=%22middle%22 dy=%22.3em%22%3E📄%3C/text%3E%3C/svg%3E'">
                    <div class="ref-label">${article.title}</div>
                </div>
            `;
        });
        leftHTML += `</div>`;

        document.getElementById('leftBigContent').innerHTML = leftHTML;

        // ---- 绑定卡片点击事件 (委托) ----
        const leftBox = document.getElementById('leftBigContent');
        leftBox.querySelectorAll('.ref-card').forEach(card => {
            card.addEventListener('click', function(e) {
                const idx = parseInt(this.dataset.articleIndex);
                if (!isNaN(idx) && articles[idx]) {
                    openModal(articles[idx]);
                }
            });
        });

        // 渲染右侧 (此时第二个section已自动使用articles)
        const rightHTML = renderRightColumn(data);
        document.getElementById('rightSmallContent').innerHTML = rightHTML;

        // 高亮语言按钮
        document.querySelectorAll('.lang-btn').forEach(btn => {
            const btnLang = btn.getAttribute('data-lang');
            if (btnLang === langCode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    // ============================================================
    //  模态框控制
    // ============================================================
    const modal = document.getElementById('articleModal');
    const modalImg = document.getElementById('modalImg');
    const modalTitle = document.getElementById('modalTitle');
    const modalDesc = document.getElementById('modalDesc');
    const modalDownload = document.getElementById('modalDownloadBtn');
    const modalClose = document.getElementById('modalCloseBtn');

    function openModal(article) {
        modalImg.src = article.img;
        modalImg.alt = article.title;
        modalTitle.textContent = article.title;
        modalDesc.textContent = article.desc;
        modalDownload.href = article.pdf;
        modal.classList.add('active');
    }

    function closeModal() {
        modal.classList.remove('active');
    }

    // 事件绑定
    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeModal();
    });

    // ============================================================
    //  语言偏好检测 & 初始化
    // ============================================================
    function detectLanguageFromPrevious() {
        let savedLang = localStorage.getItem('srg_language_pref');
        if (savedLang && (savedLang === 'zh' || savedLang === 'zh-TW' || savedLang === 'en')) {
            return savedLang;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang && (urlLang === 'zh' || urlLang === 'zh-TW' || urlLang === 'en')) {
            localStorage.setItem('srg_language_pref', urlLang);
            return urlLang;
        }
        return 'zh';
    }

    let currentLang = 'zh';

    function setLanguage(langCode, updateStorage = true) {
        if (!LANGUAGE_DATA[langCode]) return;
        currentLang = langCode;
        renderLanguage(currentLang);
        if (updateStorage) {
            localStorage.setItem('srg_language_pref', currentLang);
        }
        document.documentElement.lang = (langCode === 'zh') ? 'zh-CN' :
                                        (langCode === 'zh-TW') ? 'zh-TW' : 'en';
    }

    function initLanguageByPrevious() {
        let initialLang = detectLanguageFromPrevious();
        if (!LANGUAGE_DATA[initialLang]) initialLang = 'zh';
        setLanguage(initialLang, true);
    }

    // ============================================================
    //  绑定语言切换事件
    // ============================================================
    function bindEvents() {
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const newLang = this.getAttribute('data-lang');
                if (newLang && LANGUAGE_DATA[newLang]) {
                    setLanguage(newLang, true);
                }
            });
        });
    }

    // ============================================================
    //  处理 Banner 图片占位
    // ============================================================
    function handlePlaceholderImage() {
        const bannerImg = document.querySelector('.hero-banner img');
        if (bannerImg) {
            bannerImg.onerror = function() {
                if (!this.dataset.fallbackSet) {
                    this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 200'%3E%3Crect width='1200' height='200' fill='%233d8b62'/%3E%3Ctext x='50%25' y='50%25' font-size='20' font-family='monospace' fill='%23f0f7e6' text-anchor='middle' dy='.3em'%3E🌿 SRG 服务器 · 替换图片至 image/CORT1.jpg %3C/text%3E%3C/svg%3E";
                    this.dataset.fallbackSet = "true";
                }
            };
        }
    }

    // ============================================================
    //  启动
    // ============================================================
    window.addEventListener('DOMContentLoaded', () => {
        initLanguageByPrevious();
        bindEvents();
        handlePlaceholderImage();
        console.log("%c SRG 服规 · 已添加「参考文章」模块 (四篇文章，点击弹窗) ", "color: #2f6e47; font-size: 14px; font-family: monospace;");
    });
</script>
