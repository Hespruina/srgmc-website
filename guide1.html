<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SRG桃源服务器 | 新手指南</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        @font-face {
            font-family: 'UnifontPixel';
            src: url('font/Unifont13.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'UnifontPixel', 'Courier New', 'VT323', monospace;
            background-color: #ffeab8;
            min-height: 100vh;
            padding: 24px 32px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 20px 20px, #f0d3a0 12px, transparent 12px);
            background-size: 80px 80px;
            background-color: #fff6cf;
            background-repeat: repeat;
            animation: diagonalMoveLeftUp 22s linear infinite;
            opacity: 0.65;
        }

        @keyframes diagonalMoveLeftUp {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: -200px -200px;
            }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(248, 250, 255, 0.92);
            backdrop-filter: blur(3px);
            border: 4px solid #c9ac5d;
            box-shadow: 12px 12px 0px 0px rgba(47, 79, 109, 0.3);
            padding: 20px 24px 30px 24px;
            transition: all 0.2s;
        }

        .hero-banner {
            position: relative;
            width: 100%;
            height: 170px;
            overflow: hidden;
            border: 3px solid #edc952;
            margin-bottom: 28px;
            background: #e0d285;
            box-shadow: 6px 6px 0px #4f381e;
        }

        .hero-banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: auto;
        }

        .site-title-overlay {
            position: absolute;
            left: 20px;
            bottom: 18px;
            background: rgba(55, 43, 17, 0.85);
            padding: 6px 18px;
            border-right: 4px solid #ffd966;
            border-bottom: 4px solid #ffb347;
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 2px;
            font-family: 'UnifontPixel', monospace;
            text-transform: uppercase;
            color: #f0fcff;
            text-shadow: 3px 3px 0 #1f3f5c;
            backdrop-filter: blur(4px);
        }

        .content-grid {
            display: grid;
            grid-template-columns: 4fr 1fr;
            gap: 28px;
            margin: 20px 0 25px;
        }

        .left-bigbox {
            background: rgba(252, 253, 255, 0.94);
            border: 3px solid #edc952;
            padding: 22px 24px;
            box-shadow: 5px 5px 0px #edd9b8;
            font-size: 1rem;
            line-height: 1.5;
        }

        .left-bigbox h2 {
            font-size: 1.9rem;
            border-left: 12px solid #ffb347;
            padding-left: 15px;
            margin: 20px 0 15px 0;
            color: #1e4a6e;
            font-family: 'UnifontPixel', monospace;
        }
        .left-bigbox h3 {
            font-size: 1.5rem;
            border-left: 8px solid #ffbc6e;
            padding-left: 12px;
            margin: 18px 0 12px 0;
            color: #1a5a7a;
        }
        .left-bigbox p {
            margin-bottom: 14px;
            color: #1e3b4f;
        }
        .left-bigbox ul, .left-bigbox ol {
            margin: 8px 0 12px 30px;
            color: #1e3b4f;
        }
        .left-bigbox li {
            margin: 6px 0;
        }
        .left-bigbox .note {
            background: #eef4fb;
            border-left: 4px solid #ffb347;
            padding: 8px 15px;
            margin: 15px 0;
        }
        .cmd-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            background: #f9fef5;
            border: 2px solid #c49b7b;
            font-size: 0.9rem;
        }
        .cmd-table th, .cmd-table td {
            border: 1px solid #dcc79c;
            padding: 8px 10px;
            text-align: left;
        }
        .cmd-table th {
            background: #ffeacd;
            color: #1f557a;
        }

        .back-home-btn {
            display: inline-block;
            background: #fffbe6;
            border: 2px solid #b09549;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #7e601f;
            box-shadow: 2px 2px 0px #ddc993;
            text-decoration: none;
            margin-bottom: 20px;
        }
        .back-home-btn:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #c4b17b;
        }

        .right-smallbox {
            background: rgba(248, 252, 255, 0.96);
            border: 3px solid #edc952;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 5px 5px 0px #e0d1a1;
            position: sticky;
            top: 30px;
            align-self: start;
        }

            background: #ffeacd;
            display: inline-block;
            padding: 4px 12px;
            margin-bottom: 12px;
            border-top: 2px solid #ffbc6e;
            color: #654018;
        }

            list-style: none;
            padding-left: 0;
        }
        .toc-list li {
            margin: 12px 0;
            border-bottom: 1px dotted #d4ba8f;
            padding-bottom: 6px;
        }
        .toc-list a {
            color: #654018;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.1s;
            display: block;
        }
        .toc-list a:hover {
            color: #cc7b2c;
            transform: translateX(4px);
            text-shadow: 1px 1px 0 #eef4ff;
        }

        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: #fffae6;
            border: 2px solid #b08c49;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;

            transition: 0.05s linear;
            color: #71491c;
            box-shadow: 2px 2px 0px #ddc793;
        }
        .lang-btn.active {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            box-shadow: inset 1px 1px 0px #ad6d2a;
        }
        .lang-btn:hover {
            background: #fee3b5;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #c4ac7b;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.75rem;
            border-top: 2px solid #dccc9c;
            padding-top: 18px;
            color: #654018;
            letter-spacing: 1px;
        }
        .blink-pixel {
            animation: blink 1.2s step-end infinite;
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

            body { padding: 16px; }
            .content-grid { grid-template-columns: 1fr; gap: 24px; }
            .hero-banner { height: 130px; }
            .site-title-overlay { font-size: 1.2rem; bottom: 8px; left: 12px; }
            .right-smallbox { position: static; }
        }
        ::-webkit-scrollbar { width: 12px; background: #f0e4ca; }
        ::-webkit-scrollbar-thumb { background: #a08351; border: 1px solid #f0e3bf; }
    </style>
</head>

    const siteNameElem = document.getElementById('siteNameOverlay');
    const leftContainer = document.getElementById('leftGuideContent');
    const tocContainer = document.getElementById('tocList');
    const langBtns = document.querySelectorAll('.lang-btn');

    function renderGuide(langCode) {
        const data = LANGUAGE_DATA[langCode];
        if (!data) return;
        siteNameElem.innerText = data.siteName;

        let leftHtml = `<a href="index.html" class="back-home-btn">${data.backBtn}</a>`;
        for (let sec of data.sections) {
            leftHtml += `<h2 id="${sec.id}">${sec.title}</h2>`;
            leftHtml += `<div class="section-content">${data.content[sec.id]}</div>`;
        }
        leftContainer.innerHTML = leftHtml;

        let tocHtml = '';
        for (let sec of data.sections) {
            tocHtml += `<li><a href="#${sec.id}" class="toc-link" data-target="${sec.id}">${sec.title}</a></li>`;
        }
        tocContainer.innerHTML = tocHtml;

        document.querySelectorAll('.toc-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const targetId = link.getAttribute('data-target');
                const targetElement = document.getElementById(targetId);
                if (targetElement) {
                    targetElement.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    }

    function detectLanguageFromPrevious() {
        let savedLang = localStorage.getItem('y2k_universe_lang');
        if (savedLang && (savedLang === 'zh' || savedLang === 'zh-TW' || savedLang === 'en')) {
            return savedLang;
        }
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang && (urlLang === 'zh' || urlLang === 'zh-TW' || urlLang === 'en')) {
            localStorage.setItem('y2k_universe_lang', urlLang);
            return urlLang;
        }
        return 'zh';
    }

    let currentLang = 'zh';

    function setLanguage(langCode, updateStorage = true) {
        if (!LANGUAGE_DATA[langCode]) return;
        currentLang = langCode;
        renderGuide(currentLang);
        if (updateStorage) {
            localStorage.setItem('y2k_universe_lang', currentLang);
        }
        langBtns.forEach(btn => {
            const btnLang = btn.getAttribute('data-lang');
            if (btnLang === langCode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (langCode === 'zh') document.documentElement.lang = 'zh-CN';
        else if (langCode === 'zh-TW') document.documentElement.lang = 'zh-TW';
        else if (langCode === 'en') document.documentElement.lang = 'en';
    }

    function initLanguage() {
        let initialLang = detectLanguageFromPrevious();
        if (!LANGUAGE_DATA[initialLang]) initialLang = 'zh';
        setLanguage(initialLang, true);
    }

    function bindEvents() {
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const newLang = btn.getAttribute('data-lang');
                if (newLang && LANGUAGE_DATA[newLang]) {
                    setLanguage(newLang, true);
                }
            });
        });
    }

    function handleBannerImage() {
        const bannerImg = document.querySelector('.hero-banner img');
        if (bannerImg) {
            bannerImg.onerror = function() {
                if (!this.dataset.fallbackSet) {
                    this.src = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1200 200'%3E%3Crect width='1200' height='200' fill='%236aa9d9'/%3E%3Ctext x='50%25' y='50%25' font-size='20' font-family='monospace' fill='%23ffffff' text-anchor='middle' dy='.3em'%3E📸 替换图片: placeholder-banner.jpg%3C/text%3E%3C/svg%3E";
                    this.dataset.fallbackSet = "true";
                }
            };
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        initLanguage();
        bindEvents();
        handleBannerImage();
        console.log("%c SRG 新人生存指南 \n右侧目录可点击跳转，语言偏好自动继承", "color: #2a6d8f; font-size: 14px;");
    });
</script>
