<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SRG桃源服务器 | 资讯中心</title>
    <style>
        /* ========== RESET & 复古像素基调 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
        }

        /* 自定义像素字体 */
        @font-face {
            font-family: 'UnifontPixel';
            src: url('https://mirrors.aliyun.com/gnu/unifont/unifont-13.0.01/unifont-13.0.01.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        body {
            font-family: 'UnifontPixel', 'Courier New', 'VT323', monospace;
            background-color: #b8dcff;
            min-height: 100vh;
            padding: 24px 32px;
            position: relative;
        }

        /* 粗波点动画层 —— 斜向左上移动 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background-image: radial-gradient(circle at 20px 20px, #a0c8f0 12px, transparent 12px);
            background-size: 80px 80px;
            background-color: #cfe6ff;
            background-repeat: repeat;
            animation: diagonalMoveLeftUp 22s linear infinite;
            opacity: 0.65;
        }

        @keyframes diagonalMoveLeftUp {
            0% {
                background-position: 0 0;
            }
            100% {
                background-position: -200px -200px;
            }
        }

        /* 主容器 */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1300px;
            margin: 0 auto;
            background: rgba(248, 250, 255, 0.92);
            backdrop-filter: blur(3px);
            border: 4px solid #5d9ac9;
            box-shadow: 12px 12px 0px 0px rgba(47, 79, 109, 0.3);
            padding: 20px 28px 40px 28px;
            transition: all 0.2s;
        }

        /* 返回首页按钮 */
        .back-home-btn {
            display: inline-block;
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .back-home-btn:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        /* 语言切换器 */
        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .lang-btn {
            background: #e6f0ff;
            border: 2px solid #4982b0;
            font-family: 'UnifontPixel', monospace;
            font-weight: bold;
            font-size: 1rem;
            padding: 6px 18px;
            cursor: pointer;
            transition: 0.05s linear;
            color: #1f5a7e;
            box-shadow: 2px 2px 0px #93bbdd;
        }
        .lang-btn.active {
            background: #ffda9e;
            border-color: #b85c1a;
            color: #2e472a;
            box-shadow: inset 1px 1px 0px #ad6d2a;
        }
        .lang-btn:hover {
            background: #fee3b5;
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #7ba2c4;
        }

        /* ========== 资讯主页布局 ========== */
        .news-header {
            text-align: center;
            margin: 20px 0 30px;
        }
        .news-header h2 {
            font-size: 2.2rem;
            display: inline-block;
            background: #cde5ff;
            padding: 8px 30px;
            border-top: 4px solid #ffb347;
            border-bottom: 4px solid #ffb347;
            letter-spacing: 2px;
            color: #1e557a;
        }

        /* 特色文章 (大卡片) */
        .featured-card {
            background: rgba(255, 253, 245, 0.96);
            border: 3px solid #5d9ac9;
            box-shadow: 8px 8px 0px #a1c2e0;
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            transition: transform 0.1s;
        }
        .featured-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 12px 12px 0px #8fb4d4;
        }
        .featured-img {
            flex: 1.2;
            min-width: 240px;
            background: #7ba5c4;
        }
        .featured-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-right: 2px solid #5d9ac9;
        }
        .featured-content {
            flex: 2;
            padding: 24px;
        }
        .featured-content h3 {
            font-size: 1.8rem;
            border-left: 10px solid #ffb347;
            padding-left: 15px;
            margin-bottom: 12px;
            color: #1e4a6e;
        }
        .featured-meta {
            font-size: 0.8rem;
            color: #5f7f9a;
            margin-bottom: 16px;
            border-bottom: 1px dotted #9cbedc;
            padding-bottom: 6px;
        }
        .featured-content p {
            line-height: 1.6;
            color: #1e3b4f;
            margin-bottom: 20px;
        }
        /* 閱讀全文按鈕預設隱藏，保留程式碼以便未來啟用 */
        .read-more {
            display: none;  /* 隱藏按鈕，未來需要時可改為 inline-block */
            background: #e6f0ff;
            border: 2px solid #4982b0;
            padding: 5px 16px;
            font-family: monospace;
            font-weight: bold;
            text-decoration: none;
            color: #1f5a7e;
            transition: 0.05s;
        }
        .read-more:hover {
            background: #ffda9e;
            border-color: #b85c1a;
            transform: translate(-1px, -1px);
            box-shadow: 2px 2px 0 #7ba2c4;
        }

        /* 普通資訊網格 ———— 目前已隱藏所有卡片（不顯示） */
        .news-grid {
            display: none;  /* 整個網格隱藏，但資料仍保留在 JS 中 */
        }

        footer {
            margin-top: 50px;
            text-align: center;
            font-size: 0.75rem;
            border-top: 2px solid #9cbedc;
            padding-top: 20px;
            color: #2f6c8f;
            letter-spacing: 1px;
        }
        .blink-pixel {
            animation: blink 1.2s step-end infinite;
            font-weight: bold;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        @media (max-width: 780px) {
            body {
                padding: 16px;
            }
            .featured-card {
                flex-direction: column;
            }
            .featured-img img {
                max-height: 220px;
                width: 100%;
            }
        }

        ::-webkit-scrollbar {
            width: 12px;
            background: #caddf0;
        }
        ::-webkit-scrollbar-thumb {
            background: #5f93bb;
            border: 1px solid #bfd6f0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 語言切換欄 -->
    <div class="lang-switch">
        <button class="lang-btn" data-lang="zh">简体中文</button>
        <button class="lang-btn" data-lang="zh-TW">繁體中文</button>
        <button class="lang-btn" data-lang="en">ENGLISH</button>
    </div>

    <!-- 返回首頁按鈕 -->
    <a href="index.html" class="back-home-btn" id="backHomeBtn">← 返回首页</a>

    <!-- 動態資訊內容 -->
    <div id="newsContent">
        <!-- 由 js 根據語言渲染 -->
    </div>

    <footer>
        <span class="blink-pixel">◉</span> SRG 桃源服务器 · 最新资讯 <span class="blink-pixel">◉</span><br>
        持续更新 | 关注公告
    </footer>
</div>

<script>
    // ========= 多语言内容库 (资讯模块，所有图片/文章皆可根目录替换) =========
    // 繁體中文註釋：移除頂部橫幅圖片與標題，只保留 h2 標題。
    // 特色文章標題、摘要已修改，閱讀全文按鈕預設隱藏。
    // 普通資訊卡片資料保留但網格隱藏，卡片標題與摘要改為佔位符 title1/text1 等。
    const NEWS_DATA = {
        "zh": {
            siteName: "✦ SRG 资讯 ✦",   // 雖然 banner 已移除，但 siteName 仍保留以備未來使用
            backBtn: "← 返回首页",
            headerTitle: "服务器动态",
            featured: {
                image: "srginfo/holiday.png",   // 新圖片路徑
                title: "桃源2.0假期更新即将到来！",
                date: "2026年6月15日",
                summary: "全新地形、网址系统。本次更新即将上线，请大家敬请期待。",
                link: "#"
            },
            // 以下卡片資料保留，但頁面上不會顯示（.news-grid 已隱藏）
            cards: [
                {
                    img: "image/news/news1_zh.jpg",
                    title: "title1",
                    date: "2026年6月10日",
                    excerpt: "text1"
                },
                {
                    img: "image/news/news2_zh.jpg",
                    title: "title2",
                    date: "2026年6月5日",
                    excerpt: "text2"
                },
                {
                    img: "image/news/news3_zh.jpg",
                    title: "title3",
                    date: "2026年5月28日",
                    excerpt: "text3"
                },
                {
                    img: "image/news/news4_zh.jpg",
                    title: "title4",
                    date: "2026年5月20日",
                    excerpt: "text4"
                },
                {
                    img: "image/news/news5_zh.jpg",
                    title: "title5",
                    date: "2026年5月15日",
                    excerpt: "text5"
                },
                {
                    img: "image/news/news6_zh.jpg",
                    title: "title6",
                    date: "2026年5月8日",
                    excerpt: "text6"
                }
            ]
        },
        // 繁體中文 (基於簡體翻譯)
        "zh-TW": {
            siteName: "✦ SRG 資訊 ✦",
            backBtn: "← 返回首頁",
            headerTitle: "伺服器動態",
            featured: {
                image: "srginfo/holiday.png",
                title: "桃源2.0假期更新即將到來！",
                date: "2026年6月15日",
                summary: "全新地形、網址系統。本次更新即將上線，請大家敬請期待。",
                link: "#"
            },
            cards: [
                {
                    img: "image/news/news1_tc.jpg",
                    title: "標題1",
                    date: "2026年6月10日",
                    excerpt: "文本1"
                },
                {
                    img: "image/news/news2_tc.jpg",
                    title: "標題2",
                    date: "2026年6月5日",
                    excerpt: "文本2"
                },
                {
                    img: "image/news/news3_tc.jpg",
                    title: "標題3",
                    date: "2026年5月28日",
                    excerpt: "文本3"
                },
                {
                    img: "image/news/news4_tc.jpg",
                    title: "標題4",
                    date: "2026年5月20日",
                    excerpt: "文本4"
                },
                {
                    img: "image/news/news5_tc.jpg",
                    title: "標題5",
                    date: "2026年5月15日",
                    excerpt: "文本5"
                },
                {
                    img: "image/news/news6_tc.jpg",
                    title: "標題6",
                    date: "2026年5月8日",
                    excerpt: "文本6"
                }
            ]
        },
        // 英文
        "en": {
            siteName: "✦ SRG News ✦",
            backBtn: "← Home",
            headerTitle: "Server Updates",
            featured: {
                image: "srginfo/holiday.png",
                title: "Taoyuan 2.0 Holiday Update Coming Soon!",
                date: "June 15, 2026",
                summary: "New terrain and web system. The update is coming soon, stay tuned!",
                link: "#"
            },
            cards: [
                {
                    img: "image/news/news1_en.jpg",
                    title: "title1",
                    date: "June 10, 2026",
                    excerpt: "text1"
                },
                {
                    img: "image/news/news2_en.jpg",
                    title: "title2",
                    date: "June 5, 2026",
                    excerpt: "text2"
                },
                {
                    img: "image/news/news3_en.jpg",
                    title: "title3",
                    date: "May 28, 2026",
                    excerpt: "text3"
                },
                {
                    img: "image/news/news4_en.jpg",
                    title: "title4",
                    date: "May 20, 2026",
                    excerpt: "text4"
                },
                {
                    img: "image/news/news5_en.jpg",
                    title: "title5",
                    date: "May 15, 2026",
                    excerpt: "text5"
                },
                {
                    img: "image/news/news6_en.jpg",
                    title: "title6",
                    date: "May 8, 2026",
                    excerpt: "text6"
                }
            ]
        }
    };

    // DOM 元素
    const siteNameElem = document.getElementById('siteNameOverlay');  // 此元素已被移除，但保留變數避免錯誤
    const newsContainer = document.getElementById('newsContent');
    const backBtn = document.getElementById('backHomeBtn');
    const langBtns = document.querySelectorAll('.lang-btn');

    // 渲染資訊頁面（僅顯示特色文章，不顯示卡片網格）
    function renderNews(langCode) {
        const data = NEWS_DATA[langCode];
        if (!data) return;
        // 更新返回按鈕文字
        if (backBtn) backBtn.innerText = data.backBtn;

        // 構建版面：只有特色文章區塊，沒有卡片網格
        let html = `
            <div class="news-header">
                <h2>${data.headerTitle}</h2>
            </div>
            <!-- 特色文章 -->
            <div class="featured-card">
                <div class="featured-img">
                    <img src="${data.featured.image}" alt="featured" onerror="this.src='https://placehold.co/800x400/6aa9d9/white?text=Holiday+Update'">
                </div>
                <div class="featured-content">
                    <h3>${data.featured.title}</h3>
                    <div class="featured-meta">📅 ${data.featured.date}</div>
                    <p>${data.featured.summary}</p>
                    <!-- 閱讀全文按鈕已隱藏（CSS 控制），保留程式碼以便未來啟用 -->
                    <a href="${data.featured.link}" class="read-more" target="_blank">阅读全文 →</a>
                </div>
            </div>
            <!-- 普通資訊網格已隱藏（CSS 控制），資料保留於 JS 中 -->
        `;
        newsContainer.innerHTML = html;
    }

    // ----- 語言檢測（上一個網頁的語言設定）-----
    function detectLanguageFromPrevious() {
        // 1. URL 參數優先
        const urlParams = new URLSearchParams(window.location.search);
        const urlLang = urlParams.get('lang');
        if (urlLang && (urlLang === 'zh' || urlLang === 'zh-TW' || urlLang === 'en')) {
            localStorage.setItem('srg_language_pref', urlLang);
            return urlLang;
        }
        // 2. 本地存儲記錄
        let savedLang = localStorage.getItem('srg_language_pref');
        if (savedLang && (savedLang === 'zh' || savedLang === 'zh-TW' || savedLang === 'en')) {
            return savedLang;
        }
        // 3. 瀏覽器語言偏好
        const navLang = navigator.language || navigator.userLanguage;
        if (navLang) {
            const lang = navLang.toLowerCase();
            if (lang.startsWith('zh-tw') || lang.startsWith('zh-hk') || lang.startsWith('zh-mo')) {
                return 'zh-TW';
            } else if (lang.startsWith('zh')) {
                return 'zh';
            } else if (lang.startsWith('en')) {
                return 'en';
            }
        }
        // 4. 默認簡體中文
        return 'zh';
    }

    let currentLang = 'zh';

    function setLanguage(langCode, updateStorage = true) {
        if (!NEWS_DATA[langCode]) return;
        currentLang = langCode;
        renderNews(currentLang);
        // 高亮語言按鈕
        langBtns.forEach(btn => {
            const btnLang = btn.getAttribute('data-lang');
            if (btnLang === langCode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        if (updateStorage) {
            localStorage.setItem('srg_language_pref', currentLang);
        }
        // 更新 html lang 屬性
        if (langCode === 'zh') document.documentElement.lang = 'zh-CN';
        else if (langCode === 'zh-TW') document.documentElement.lang = 'zh-TW';
        else if (langCode === 'en') document.documentElement.lang = 'en';
    }

    function initLanguage() {
        let initialLang = detectLanguageFromPrevious();
        if (!NEWS_DATA[initialLang]) initialLang = 'zh';
        setLanguage(initialLang, true);
    }

    // 綁定語言切換事件
    function bindEvents() {
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                const newLang = btn.getAttribute('data-lang');
                if (newLang && NEWS_DATA[newLang]) {
                    setLanguage(newLang, true);
                }
            });
        });
    }

    window.addEventListener('DOMContentLoaded', () => {
        initLanguage();
        bindEvents();
        console.log("%c✨ SRG 資訊頁面已更新 · 移除橫幅、隱藏卡片網格，特色文章圖片已替換 ✨", "color: #2a6d8f; font-size: 14px;");
    });
</script>
</body>
</html>
